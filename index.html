<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>딱중간 · 지하철 중간지점 찾기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow: hidden; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; }
  #root { width: 100%; height: 100vh; }
  input { font-family: inherit; }
  button { font-family: inherit; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  @keyframes dashFlow { to { stroke-dashoffset: -16; } }
  @keyframes trainMove {
    0%   { transform: translate(14px, 0) rotate(-20deg); }
    50%  { transform: translate(120px, 0) rotate(0deg); }
    100% { transform: translate(226px, 0) rotate(20deg); }
  }
  @keyframes rpsSpin {
    0%, 100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-8px) rotate(8deg); }
  }
  @keyframes wander {
    0%, 100% { transform: rotate(-10deg); }
    50% { transform: rotate(10deg); }
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  /* Hide scrollbars for a cleaner mobile look */
  div::-webkit-scrollbar { display: none; }
  div { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<!--
  API 키 설정 (.env 파일):
    VITE_PUBLIC_DATA_API_KEY  — 공공데이터포털 대중교통환승경로 API
    VITE_KAKAO_REST_API_KEY   — 카카오 로컬 REST API (역 자동완성 + 장소 검색)

  Vite 빌드 환경에서는 import.meta.env.VITE_* 로 접근합니다.
  현재 파일은 standalone Babel 빌드로, window.ENV 에 아래 값을 주입하거나
  빌드 파이프라인을 통해 교체하세요.
-->
<script>
  window.ENV = {
    PUBLIC_DATA_API_KEY: '601b74f1cfe5294b35ab350c808a9512fadb494be9bcb38ab93a2834732c1a86',
    KAKAO_REST_API_KEY:  '9dbde146df89f5a58f8e123d8151eaa7',
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="result.jsx"></script>
<script type="text/babel" src="main.jsx"></script>
</body>
</html>
